name: CI Tests

on:
  pull_request:
    branches: [master]

jobs:
  test:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
      - run: vp install --frozen-lockfile
      - name: Run Unit Tests
        run: vp test

  test-integration:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
      - run: vp install --frozen-lockfile
      - name: Run Integration Tests
        run: vp test --project integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  lint:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
      - run: vp install --frozen-lockfile
      - name: Run CI checks (lint/format)
        run: vp check && vp run knip

  build:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
      - run: vp install --frozen-lockfile
      - name: Check build
        run: vp build
