pre-commit:
  parallel: false
  jobs:
    - name: oxlint
      glob: "*.{js,ts,tsx,jsx,mjs,cjs,json,css}"
      run: pnpm oxlint --fix {staged_files} && git add {staged_files}
    - name: oxfmt
      glob: "*.{js,ts,tsx,jsx,mjs,cjs,json,css}"
      run: pnpm oxfmt --write {staged_files} && git add {staged_files}
    - name: vitest
      run: pnpm vitest run --project unit

pre-push:
  jobs:
    - name: vitest-changed
      run: pnpm vitest run --changed origin/master --project unit
